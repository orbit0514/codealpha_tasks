<!DOCTYPE html>

<html>

<head>

<title>Music Player</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="player">

<img src="cover.png" class="cover">

<h1>🎵 Music Player</h1>

<h2 id="song-title">

Tum prem ho ✨

</h2>

<audio id="audio">

<source src="song.mp3">

</audio>

<input
type="range"
id="progress"
value="0">

<br>
<br>

<label>🔊 Volume</label>

<input
type="range"
id="volume"

min="0"

max="1"

step="0.1"

value="1">
<p id="time">

00:00

</p>

<button onclick="playMusic()">

▶

</button>

<button onclick="pauseMusic()">

⏸

</button>

</div>

<script src="script.js">

</script>

</body>

</html>
